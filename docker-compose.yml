services:
  backend:
    image: dashboard-backend:latest
    container_name: dashboard-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /home/notcompromised/dashboard/data:/app/data
      - /home/notcompromised/dashboard/static:/app/static
      - /home/notcompromised/dashboard/.env:/app/.env
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
